<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg" cx="70%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#09090e"/>
    </radialGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="blur-bg"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="glow-dot"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-e"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Subtle blue glow blob -->
  <circle cx="200" cy="800" r="500" fill="#3b82f6" opacity="0.06" filter="url(#blur-bg)"/>

  <!-- Large atom on right (matching OG style — white orbits) -->
  <g transform="translate(820, 380)">
    <ellipse cx="0" cy="0" rx="200" ry="72" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="200" ry="72" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="200" ry="72" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" transform="rotate(-60)"/>
    <circle cx="173" cy="-36" r="12" fill="white" opacity="0.9" filter="url(#glow-e)"/>
    <g transform="rotate(60)"><circle cx="-200" cy="0" r="12" fill="white" opacity="0.9" filter="url(#glow-e)"/></g>
    <g transform="rotate(-60)"><circle cx="0" cy="72" r="12" fill="white" opacity="0.9" filter="url(#glow-e)"/></g>
    <circle cx="0" cy="0" r="38" fill="white" opacity="0.97"/>
    <circle cx="0" cy="0" r="20" fill="#09090e" opacity="0.45"/>
  </g>

  <!-- Top logo mark -->
  <rect x="80" y="80" width="56" height="56" rx="13" fill="url(#badge-grad)"/>
  <rect x="84" y="84" width="48" height="48" rx="10" fill="#09090e"/>
  <circle cx="108" cy="108" r="8" fill="#3b82f6" filter="url(#glow-dot)" opacity="0.9"/>
  <circle cx="108" cy="108" r="5" fill="#60a5fa"/>

  <!-- Brand name -->
  <text x="154" y="116" font-family="'Onest', -apple-system, sans-serif" font-weight="600" font-size="22" letter-spacing="2" fill="rgba(255,255,255,0.45)">MOMENTUM.OS</text>

  <!-- Divider -->
  <line x1="80" y1="164" x2="620" y2="164" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Big stat -->
  <text x="80" y="400" font-family="'Onest', -apple-system, sans-serif" font-weight="800" font-size="200" fill="white" opacity="0.06" letter-spacing="-8">41</text>
  <text x="80" y="390" font-family="'Onest', -apple-system, sans-serif" font-weight="800" font-size="160" fill="white" opacity="0.9" letter-spacing="-6">41</text>
  <text x="80" y="440" font-family="'Onest', -apple-system, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.45)" letter-spacing="3">HOURS LOST PER WEEK TO MANUAL WORK</text>

  <!-- Divider 2 -->
  <line x1="80" y1="480" x2="940" y2="480" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Main headline -->
  <text x="80" y="570" font-family="'Onest', -apple-system, sans-serif" font-weight="700" font-size="60" fill="white" opacity="0.95" letter-spacing="-1.5">Stop doing it manually.</text>
  <text x="80" y="650" font-family="'Onest', -apple-system, sans-serif" font-weight="700" font-size="60" fill="white" opacity="0.95" letter-spacing="-1.5">Start scaling on</text>
  <text x="80" y="730" font-family="'Onest', -apple-system, sans-serif" font-weight="700" font-size="60" fill="#60a5fa" letter-spacing="-1.5">autopilot.</text>

  <!-- Body -->
  <text x="80" y="810" font-family="'Onest', -apple-system, sans-serif" font-weight="400" font-size="26" fill="rgba(255,255,255,0.38)">AI workflows · CRM intelligence · Execution engine</text>

  <!-- CTA strip -->
  <rect x="80" y="870" width="420" height="64" rx="32" fill="#3b82f6"/>
  <text x="290" y="910" text-anchor="middle" font-family="'Onest', -apple-system, sans-serif" font-weight="600" font-size="24" fill="white">Book a free demo →</text>

  <!-- Domain -->
  <text x="940" y="910" text-anchor="end" font-family="'Onest', -apple-system, sans-serif" font-weight="400" font-size="20" fill="rgba(255,255,255,0.22)">os-momentum.com</text>

  <!-- Bottom line -->
  <line x1="0" y1="980" x2="1080" y2="980" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="1040" font-family="'Onest', -apple-system, sans-serif" font-weight="400" font-size="18" fill="rgba(255,255,255,0.2)">No contracts · Setup in 48 hours · ROI in 30 days</text>
</svg>
