<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg2" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0e0e16"/>
      <stop offset="100%" stop-color="#09090e"/>
    </radialGradient>
    <linearGradient id="bg2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg2)"/>
  <circle cx="900" cy="150" r="400" fill="#3b82f6" opacity="0.07" filter="url(#blur2)"/>

  <!-- Top logo badge -->
  <rect x="80" y="80" width="56" height="56" rx="13" fill="url(#bg2-grad)"/>
  <rect x="84" y="84" width="48" height="48" rx="10" fill="#09090e"/>
  <circle cx="108" cy="108" r="8" fill="#3b82f6" filter="url(#glow2)" opacity="0.9"/>
  <circle cx="108" cy="108" r="5" fill="#60a5fa"/>
  <text x="154" y="116" font-family="'Onest', -apple-system, sans-serif" font-weight="600" font-size="22" letter-spacing="2" fill="rgba(255,255,255,0.45)">MOMENTUM.OS</text>
  <line x1="80" y1="164" x2="620" y2="164" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Headline -->
  <text x="80" y="270" font-family="'Onest', -apple-system, sans-serif" font-weight="700" font-size="68" fill="white" opacity="0.95" letter-spacing="-2">3 things running your</text>
  <text x="80" y="358" font-family="'Onest', -apple-system, sans-serif" font-weight="700" font-size="68" fill="white" opacity="0.95" letter-spacing="-2">business while you</text>
  <text x="80" y="446" font-family="'Onest', -apple-system, sans-serif" font-weight="700" font-size="68" fill="#60a5fa" letter-spacing="-2">sleep.</text>

  <!-- Feature cards -->
  <!-- Card 1 -->
  <rect x="80" y="500" width="900" height="136" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="80" y="500" width="3" height="136" rx="2" fill="#3b82f6"/>
  <text x="116" y="558" font-family="'Onest', -apple-system, sans-serif" font-weight="700" font-size="30" fill="white" opacity="0.9">⚡  AI Workflow Automation</text>
  <text x="116" y="604" font-family="'Onest', -apple-system, sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.4)">Triggers, logic, actions — running 24/7 without you.</text>

  <!-- Card 2 -->
  <rect x="80" y="656" width="900" height="136" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="80" y="656" width="3" height="136" rx="2" fill="rgba(255,255,255,0.45)"/>
  <text x="116" y="714" font-family="'Onest', -apple-system, sans-serif" font-weight="700" font-size="30" fill="white" opacity="0.9">🤖  CRM Intelligence</text>
  <text x="116" y="760" font-family="'Onest', -apple-system, sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.4)">A CRM that learns your pipeline and tells you what's next.</text>

  <!-- Card 3 -->
  <rect x="80" y="812" width="900" height="136" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="80" y="812" width="3" height="136" rx="2" fill="#3b82f6"/>
  <text x="116" y="870" font-family="'Onest', -apple-system, sans-serif" font-weight="700" font-size="30" fill="white" opacity="0.9">📈  Real-Time Dashboards</text>
  <text x="116" y="916" font-family="'Onest', -apple-system, sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.4)">Every metric that matters, visible at a glance.</text>

  <!-- Bottom -->
  <line x1="0" y1="990" x2="1080" y2="990" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="1042" font-family="'Onest', -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.2)">os-momentum.com</text>
  <text x="1000" y="1042" text-anchor="end" font-family="'Onest', -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.2)">Trusted by 500+ operators</text>
</svg>
