<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="glow-a">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="40" cy="40" r="40" fill="#09090e"/>

  <!-- Subtle glow behind nucleus -->
  <circle cx="40" cy="40" r="30" fill="rgba(255,255,255,0.03)"/>

  <!-- Orbit ring 1: horizontal -->
  <ellipse cx="40" cy="40" rx="34" ry="12" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <!-- Orbit ring 2: 60° tilt -->
  <ellipse cx="40" cy="40" rx="34" ry="12" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" transform="rotate(60 40 40)"/>
  <!-- Orbit ring 3: -60° tilt -->
  <ellipse cx="40" cy="40" rx="34" ry="12" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" transform="rotate(-60 40 40)"/>

  <!-- Electrons (matching OG image frozen positions) -->
  <circle cx="74" cy="40" r="4" fill="white" opacity="0.9" filter="url(#glow-a)"/>
  <g transform="rotate(60 40 40)">
    <circle cx="6" cy="40" r="4" fill="white" opacity="0.9" filter="url(#glow-a)"/>
  </g>
  <g transform="rotate(-60 40 40)">
    <circle cx="40" cy="52" r="4" fill="white" opacity="0.9" filter="url(#glow-a)"/>
  </g>

  <!-- Nucleus core -->
  <circle cx="40" cy="40" r="10" fill="white" opacity="0.97"/>
  <circle cx="40" cy="40" r="5.5" fill="#09090e" opacity="0.45"/>
</svg>
