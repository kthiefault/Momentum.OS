<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <filter id="glow-d">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- White/light background -->
  <rect width="320" height="80" fill="#FFFFFF" rx="8"/>

  <!-- Orbit ring 1 -->
  <ellipse cx="44" cy="40" rx="32" ry="11" fill="none" stroke="#1A57DB" stroke-width="1.4" opacity="0.85"/>
  <!-- Orbit ring 2 -->
  <ellipse cx="44" cy="40" rx="32" ry="11" fill="none" stroke="#0097A7" stroke-width="1" opacity="0.65" transform="rotate(60 44 40)"/>
  <!-- Orbit ring 3 -->
  <ellipse cx="44" cy="40" rx="32" ry="11" fill="none" stroke="#0097A7" stroke-width="1" opacity="0.65" transform="rotate(-60 44 40)"/>

  <!-- Electrons -->
  <circle cx="76" cy="40" r="2.8" fill="#1A57DB" filter="url(#glow-d)"/>
  <circle cx="28.5" cy="20.5" r="2.2" fill="#0097A7" filter="url(#glow-d)"/>
  <circle cx="28.5" cy="59.5" r="2.2" fill="#0097A7" filter="url(#glow-d)"/>

  <!-- Nucleus -->
  <circle cx="44" cy="40" r="5.5" fill="#1A57DB" filter="url(#glow-d)"/>
  <circle cx="44" cy="40" r="2.5" fill="#FFFFFF"/>

  <!-- Wordmark -->
  <text x="98" y="34" font-family="'Onest', 'Inter', -apple-system, sans-serif" font-weight="700" font-size="19" letter-spacing="-0.5" fill="#08090C">Momentum</text>
  <text x="98" y="56" font-family="'Onest', 'Inter', -apple-system, sans-serif" font-weight="400" font-size="13" letter-spacing="3" fill="#1A57DB">.OS</text>
  <line x1="98" y1="60" x2="230" y2="60" stroke="#1A57DB" stroke-width="0.5" opacity="0.3"/>
</svg>
