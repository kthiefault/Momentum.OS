<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1630"/>
      <stop offset="100%" stop-color="#08090C"/>
    </radialGradient>
    <radialGradient id="core-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#6EDCF7"/>
      <stop offset="100%" stop-color="#1A57DB"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A57DB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1A57DB" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-i">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="40" fill="url(#bg-grad)"/>

  <!-- Glow halo -->
  <circle cx="40" cy="40" r="30" fill="url(#halo)"/>

  <!-- Orbit ring 1 — horizontal -->
  <ellipse cx="40" cy="40" rx="28" ry="10" fill="none" stroke="#1A57DB" stroke-width="1.5" opacity="0.9"/>

  <!-- Orbit ring 2 — 60° tilt -->
  <ellipse cx="40" cy="40" rx="28" ry="10" fill="none" stroke="#6EDCF7" stroke-width="1.1" opacity="0.75" transform="rotate(60 40 40)"/>

  <!-- Orbit ring 3 — -60° tilt -->
  <ellipse cx="40" cy="40" rx="28" ry="10" fill="none" stroke="#6EDCF7" stroke-width="1.1" opacity="0.75" transform="rotate(-60 40 40)"/>

  <!-- Electrons -->
  <circle cx="68" cy="40" r="3" fill="#1A57DB" filter="url(#glow-i)"/>
  <circle cx="26" cy="18.4" r="2.5" fill="#6EDCF7" filter="url(#glow-i)"/>
  <circle cx="26" cy="61.6" r="2.5" fill="#6EDCF7" filter="url(#glow-i)"/>

  <!-- Nucleus -->
  <circle cx="40" cy="40" r="6" fill="#1A57DB" filter="url(#glow-i)"/>
  <circle cx="40" cy="40" r="3" fill="url(#core-grad)"/>
</svg>
