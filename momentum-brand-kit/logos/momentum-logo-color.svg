<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <radialGradient id="nucleus-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#6EDCF7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1A57DB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#6EDCF7"/>
      <stop offset="100%" stop-color="#1A57DB"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="orbit1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A57DB" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#1A57DB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1A57DB" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="orbit2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6EDCF7" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#6EDCF7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6EDCF7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background (dark) -->
  <rect width="320" height="80" fill="#08090C" rx="8"/>

  <!-- Icon mark: atom/nucleus (centered at x=44, y=40) -->
  <!-- Outer glow halo -->
  <circle cx="44" cy="40" r="26" fill="url(#nucleus-glow)" opacity="0.15"/>

  <!-- Orbit ring 1 — horizontal ellipse -->
  <ellipse cx="44" cy="40" rx="32" ry="11" fill="none" stroke="#1A57DB" stroke-width="1.4" opacity="0.9"/>

  <!-- Orbit ring 2 — rotated 60° -->
  <ellipse cx="44" cy="40" rx="32" ry="11" fill="none" stroke="#6EDCF7" stroke-width="1" opacity="0.7" transform="rotate(60 44 40)"/>

  <!-- Orbit ring 3 — rotated -60° -->
  <ellipse cx="44" cy="40" rx="32" ry="11" fill="none" stroke="#6EDCF7" stroke-width="1" opacity="0.7" transform="rotate(-60 44 40)"/>

  <!-- Electrons -->
  <circle cx="76" cy="40" r="2.8" fill="#1A57DB" filter="url(#glow)"/>
  <circle cx="28.5" cy="20.5" r="2.2" fill="#6EDCF7" filter="url(#glow)"/>
  <circle cx="28.5" cy="59.5" r="2.2" fill="#6EDCF7" filter="url(#glow)"/>

  <!-- Nucleus core -->
  <circle cx="44" cy="40" r="5.5" fill="#1A57DB" filter="url(#glow)"/>
  <circle cx="44" cy="40" r="2.5" fill="url(#core)"/>

  <!-- Wordmark -->
  <text x="98" y="34" font-family="'Onest', 'Inter', -apple-system, sans-serif" font-weight="700" font-size="19" letter-spacing="-0.5" fill="#F5EDE0">Momentum</text>
  <text x="98" y="56" font-family="'Onest', 'Inter', -apple-system, sans-serif" font-weight="400" font-size="13" letter-spacing="3" fill="#6EDCF7">.OS</text>
  <line x1="98" y1="60" x2="230" y2="60" stroke="#1A57DB" stroke-width="0.5" opacity="0.4"/>
</svg>
