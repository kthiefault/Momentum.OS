<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <filter id="glow-w">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- No background — for use on any dark surface -->

  <!-- Atom orbit mark (white, matching OG image style) -->
  <ellipse cx="40" cy="40" rx="28" ry="10" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.8"/>
  <ellipse cx="40" cy="40" rx="28" ry="10" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.8" transform="rotate(60 40 40)"/>
  <ellipse cx="40" cy="40" rx="28" ry="10" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.8" transform="rotate(-60 40 40)"/>
  <!-- Electrons -->
  <circle cx="68" cy="40" r="3.5" fill="white" opacity="0.9" filter="url(#glow-w)"/>
  <circle cx="26" cy="16.2" r="3.5" fill="white" opacity="0.9" filter="url(#glow-w)"/>
  <circle cx="26" cy="63.8" r="3.5" fill="white" opacity="0.9" filter="url(#glow-w)"/>
  <!-- Nucleus -->
  <circle cx="40" cy="40" r="8" fill="white" opacity="0.97"/>
  <circle cx="40" cy="40" r="4.5" fill="rgba(0,0,0,0.35)"/>

  <!-- Wordmark -->
  <text x="88" y="36" font-family="'Onest', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="22" letter-spacing="-0.5" fill="#ffffff">Momentum</text>
  <text x="88" y="58" font-family="'Onest', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="14" letter-spacing="3" fill="rgba(255,255,255,0.45)">.OS</text>
</svg>
