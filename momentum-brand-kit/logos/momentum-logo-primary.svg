<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="380" height="80" fill="#09090e" rx="10"/>

  <!-- Favicon-style badge icon (left) -->
  <rect x="16" y="16" width="48" height="48" rx="11" fill="url(#badge-grad)"/>
  <rect x="19" y="19" width="42" height="42" rx="9" fill="#09090e"/>
  <circle cx="40" cy="40" r="7" fill="#3b82f6" filter="url(#glow)" opacity="0.9"/>
  <circle cx="40" cy="40" r="4" fill="#60a5fa"/>

  <!-- Wordmark -->
  <text x="80" y="36" font-family="'Onest', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="22" letter-spacing="-0.5" fill="#ffffff">Momentum</text>
  <text x="80" y="58" font-family="'Onest', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="14" letter-spacing="3" fill="rgba(255,255,255,0.45)">.OS</text>
</svg>
